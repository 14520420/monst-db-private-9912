<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>モンスト攻略・最強ティア表</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .detail-img-container {
      width: 100%;
      height: 280px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid #444;
    }
    .detail-img-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; /* 全体を表示 */
    }
    input::placeholder, textarea::placeholder {
      color: transparent !important; /* 例：を非表示 */
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-logo"><i class="fas fa-dragon"></i> <span class="logo-text">MONST DATABASE</span></div>
    <div class="site-tabs">
      <a href="index.html" class="site-tab">おすすめ商品</a>
      <a href="monst.html" class="site-tab active">モンスト攻略</a>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" data-view="tier"><i class="fas fa-crown"></i> 最強ティア表</button>
      <button class="nav-btn" data-view="list"><i class="fas fa-scroll"></i> クエスト一覧</button>
    </nav>
    <div class="header-actions">
      <div class="search-box"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="検索..."></div>
      <button id="btn-edit-mode" class="btn-icon"><i class="fas fa-pen-nib"></i></button>
    </div>
  </div>
</header>

<main class="main-content">
  <section id="view-tier" class="view active">
    <div class="view-header">
      <h2 class="view-title" id="tier-title">全キャラ最強ランキング</h2>
      <button id="btn-add-char" class="btn-primary" style="display:none;"><i class="fas fa-user-plus"></i> キャラ追加</button>
    </div>
    <div id="tier-container" class="tier-container"></div>
    <div id="unclassified-container" class="unclassified-container" style="display:none;">
      <h3 class="unclassified-title">未分類のキャラ</h3>
      <div id="tier-pool" class="tier-row-content"></div>
    </div>
  </section>

  <section id="view-list" class="view">
    <div class="view-header">
      <div id="category-filters" class="category-filters">
        <button class="filter-btn active" data-category="all">すべて</button>
        <button class="filter-btn" data-category="黎絶">黎絶</button>
        <button class="filter-btn" data-category="轟絶">轟絶</button>
        <button class="filter-btn" data-category="爆絶">爆絶</button>
        <button class="filter-btn" data-category="超絶">超絶</button>
        <button class="filter-btn" data-category="超究極">超究極</button>
        <button class="filter-btn" data-category="天魔(試練)">天魔(試練)</button>
        <button class="filter-btn" data-category="天魔(空中庭園)">天魔(空中庭園)</button>
        <button class="filter-btn" data-category="禁忌">禁忌</button>
      </div>
      <button id="btn-add-quest" class="btn-primary" style="display:none;"><i class="fas fa-plus"></i> クエスト追加</button>
    </div>
    <div id="products-grid" class="products-grid"></div>
  </section>
</main>

<div id="modal-product" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-title" class="modal-title">編集</h2>
      <button class="modal-close" id="btn-close-modal"><i class="fas fa-times"></i></button>
    </div>
    <form id="product-form">
      <input type="hidden" id="p-id">
      <input type="hidden" id="p-type">
      <div class="modal-body">
        <div class="form-group"><label>名前</label><input type="text" id="p-name" required></div>
        <div class="form-row">
          <div class="form-group"><label>属性 / クエスト種別</label><select id="p-category"></select></div>
          <div id="field-tier" class="form-group"><label>ティア</label>
            <select id="p-tier">
              <option value="S">S</option><option value="A">A</option><option value="B">B</option>
              <option value="C">C</option><option value="D">D</option><option value="未分類">未分類</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>画像URL</label><input type="text" id="p-image-url"></div>
        <div id="char-status-fields">
          <div class="form-row"><div class="form-group"><label>タイプ</label><input type="text" id="p-type-detail"></div><div class="form-group"><label>ラック</label><input type="text" id="p-luck"></div></div>
          <div class="form-group"><label>アビリティ</label><input type="text" id="p-abi"></div>
          <div class="form-group"><label>ゲージ</label><input type="text" id="p-gauge"></div>
          <div class="form-group"><label>SS</label><input type="text" id="p-ss"></div>
          <div class="form-group"><label>友情コンボ</label><input type="text" id="p-main-friend"></div>
          <div class="form-group"><label>サブ友情</label><input type="text" id="p-sub-friend"></div>
        </div>
        <div id="quest-desc-field" style="display:none;"><div class="form-group"><label>ギミック詳細</label><textarea id="p-description" rows="3"></textarea></div></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="btn-cancel-modal">キャンセル</button>
        <button type="submit" class="btn-primary">保存する</button>
      </div>
    </form>
  </div>
</div>

<div id="modal-detail" class="modal-overlay" style="display:none;"><div class="modal-box"><div id="detail-content"></div></div></div>

<script src="js/monst.js"></script>
</body>
</html>
<script type="module">
  // Firebaseの読み込み
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // 手順1でメモした自分のconfigに書き換えてください
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // monst.jsから使えるようにグローバルに公開
  window.db = db;
  window.fsMethods = { doc, setDoc, getDoc };
</script>
<script src="js/monst.js" type="module"></script> ```
